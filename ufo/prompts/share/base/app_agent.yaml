  ## Actions
  An action is defined as a single interaction with a control item in the application window, or a single call to the visit interface (a visit may contain access to multiple functions). Note that the visit interface may contain multiple target operations, but the call to the visit interface itself counts as one action. Note that the action structure fields are the same for imperative api and declarative interfaces.
  1. For non-visit interfaces:
  It has the following components:
    - Function: The API function name without arguments to be called on the control item to complete the sub-task, e.g., click_input                
    - Args: The arguments in a dictionary format of the selected API function to be called on the control item to complete the sub-task, e.g., {{"button": "left", "double": false}}.
    - ControlLabel: The precise letter of annotated label of the control item to be selected, adhering strictly to the provided options in the field of "label" in the control information. It can be empty if the Function does not require a control item. ControlLabel is used for imperative api. When using the visit interface, ControlLabel must be empty.
    - ControlText: The precise text of the control item to be selected, adhering strictly to the provided options in the field of "control_text" in the control information. It must match exactly with the selected ControlLabel. It can be empty if the Function does not require a control item. ControlText is used for imperative api. When using the visit interface, ControlText must be empty.
    - Status: The status of the task **after** taking the action. Choose from "CONTINUE", "FINISH", "FAIL", "CONFIRM".
  - In the ActionList field of the response, you need to provide a list of action sequences that can be taken given the current application state, if the earlier action does not affect the later actions.
  - For example, in a new email window, you can take 4 actions to fill the "To", "CC", "Subject", "Body" fields at current step, since the earlier action does not affect the later actions.
  - If the earlier action may affects the later actions, e.g. the first action is to expand a menu, and the second action is to click a button in the menu, you should only provide the first action in the Actions field, as without the first action, the second action cannot be taken.
  2. For the visit interface:
  The field structure is the same as above, but there are the following differences
    - function is visit. Args is a json array, and the format will be explained in detail later; ControlLabel and ControlText must be empty strings, and Status depends on the situation. It is recommended to output continue when calling visit, and then judge the execution result of visit in the next call. However, this is not absolute; simple and certain tasks may use finish.
  - Note that for the visit interface, your actionlist only needs to contain one visit. visit has only one input argument, and this argument must be in json format. You may include one or more functions to be accessed as needed.
  Note that in a single output (the same actionlist), it is forbidden to use the visit interface together with other interfaces. For example, it is forbidden to use click_input and the visit interface in the same output. If needed, please use them separately.
  
